<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320">
<stop stop-color="#0D1117"/>
<stop offset="0.5" stop-color="#111827"/>
<stop offset="1" stop-color="#020617"/>
</linearGradient>

<linearGradient id="logo" x1="0" y1="0" x2="500" y2="100">
<stop stop-color="#00E5FF"/>
<stop offset="0.5" stop-color="#7C3AED"/>
<stop offset="1" stop-color="#22C55E"/>
</linearGradient>

<linearGradient id="text" x1="0" y1="0" x2="400" y2="0">
<stop stop-color="#00E5FF"/>
<stop offset="1" stop-color="#22C55E"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="blur"/>
</filter>

</defs>


<!-- Background -->

<rect width="1200" height="320" rx="20" fill="url(#bg)"/>


<!-- Grid -->

<g opacity="0.12" stroke="#00E5FF">

<path d="M0 80H1200"/>
<path d="M0 160H1200"/>
<path d="M0 240H1200"/>

<path d="M200 0V320"/>
<path d="M400 0V320"/>
<path d="M600 0V320"/>
<path d="M800 0V320"/>
<path d="M1000 0V320"/>

</g>


<!-- Glow -->

<text x="600"
y="125"
text-anchor="middle"
font-family="monospace"
font-size="92"
font-weight="900"
fill="#00E5FF"
opacity="0.4"
filter="url(#glow)">
Y3KH
</text>


<!-- Main Logo -->

<text x="600"
y="125"
text-anchor="middle"
font-family="monospace"
font-size="92"
font-weight="900"
fill="url(#logo)">
Y3KH
</text>


<!-- Labs -->

<text x="600"
y="175"
text-anchor="middle"
font-family="monospace"
font-size="34"
font-weight="700"
letter-spacing="12"
fill="#FFFFFF">
LABS
</text>


<!-- Tagline -->

<text x="600"
y="235"
text-anchor="middle"
font-family="monospace"
font-size="24"
fill="url(#text)">
Infrastructure • Security • AI Automation
</text>


<!-- Footer -->

<text x="600"
y="280"
text-anchor="middle"
font-family="monospace"
font-size="16"
fill="#94A3B8">
Building Secure Systems Through Automation
</text>


</svg>
